<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小音の存鑽存歌</title>
  <meta name="description" content="小音の存鑽存歌查詢頁，只呈現 Google 試算表 A～F 欄資料。" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+TC:wght@500;700;900&family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="0.9em" font-size="90">♬⋆</text></svg>'>
</head>
<body>
  <div class="sky-glow"></div>
  <div class="mist mist-a"></div>
  <div class="mist mist-b"></div>
  <div class="floating-icons" aria-hidden="true">
    <span style="--x:8%; --delay:0s; --duration:13s;">☁️</span>
    <span style="--x:18%; --delay:2s; --duration:16s;">♡</span>
    <span style="--x:31%; --delay:5s; --duration:18s;">✦</span>
    <span style="--x:49%; --delay:1s; --duration:14s;">🎀</span>
    <span style="--x:64%; --delay:4s; --duration:17s;">☁️</span>
    <span style="--x:80%; --delay:3s; --duration:15s;">♡</span>
    <span style="--x:92%; --delay:6s; --duration:19s;">✧</span>
  </div>

  <main class="page-shell">
    <section class="hero panel">
      <div class="cinnamoroll-buddy" aria-hidden="true">
        <span class="ear ear-left"></span>
        <span class="ear ear-right"></span>
        <span class="face">
          <span class="eye eye-left"></span>
          <span class="eye eye-right"></span>
          <span class="cheek cheek-left"></span>
          <span class="cheek cheek-right"></span>
          <span class="mouth">ω</span>
        </span>
      </div>
      <div class="seal">小音</div>
      <p class="eyebrow"></p>
      <h1>小音の存鑽存歌</h1>
      <p class="subtitle">"歡迎來到小音存活專區，可以預約時間私下還存鑽及存活2026年底清空。</p>

      <div class="search-card" role="search">
        <label for="searchInput">懶得找就來查看看</label>
        <div class="search-row">
          <input id="searchInput" type="search" autocomplete="off" placeholder="查詢" />
          <button id="clearBtn" type="button">顯示全部</button>
        </div>
        <p id="resultText" class="result-text">資料載入中…</p>
      </div>
    </section>

    <section class="panel content-panel" aria-label="存鑽資料查詢結果">
      <div class="table-wrap">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <span>☁️ 謝謝大家的支持</span>
    <span>｜</span>
    <span>我愛粉色，粉色愛我</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
